/* ── Conversation timeline (continuous, across all turns of one conversation) ── */
function convItems(){
  const conv = curConv(), all = DATA.records || [];
  return { conv, items: conv.idxs.map(idx=>{
    const r = all[idx], t = r.trace || {};
    return {idx, r, t, events: turnEvents(t, r)};
  })};
}
function panelTimeline(){
  const {conv, items} = convItems();
  const n = items.length, ng = convGroups().length;
  if(!n) return '<h2>Conversation timeline</h2><p class="none">No records.</p>';
  if(tlSel.turn >= n) tlSel = {turn:0, evt:0};
  if(tlSel.evt >= (items[tlSel.turn].events.length||1)) tlSel.evt = 0;
  const sess = conv.cid ? `session ${esc(String(conv.cid).slice(0,8))}` : "standalone (no session id)";
  let h = `<h2>Conversation timeline <span class="dim">— ${n} turn(s) · ${sess}`+
          `${ng>1?` · conversation with focus turn (this report has ${ng} separate conversations)`:""}</span></h2>`;
  if(n===1) h += `<p class="dim">This is a single-turn conversation. A multi-turn shared session (same conversation_id)
    renders here as one continuous timeline across all its turns.</p>`;
  let list = "", total = 0;
  items.forEach((it,ti)=>{
    const p = it.t.path||{};
    const bot = it.r.error ? ("⚠ "+it.r.error)
      : (it.r.refusal_reason ? ("refused — "+it.r.refusal_reason) : (it.r.answer||"(no answer)"));
    const collapsed = tlCollapsed.has(ti);
    let rows = "";
    if(!it.events.length){ rows += `<div class="none" style="padding:.2rem .6rem">no events</div>`; }
    const maxd = Math.max(...it.events.map(e=>e.dur||0), 1);
    let stepFolded = false;  // are we inside a folded step's ReAct children?
    it.events.forEach((e,ei)=>{
      if(e.kind==="step"){ stepFolded = tlStepFold.has(`${ti}:${ei}`); }
      else if(e.depth){ if(stepFolded){ total++; return; } }  // hidden under a folded step
      else { stepFolded = false; }                            // top-level event ends the step's child run
      // The final agent response — render it as a prominent, full-text block.
      if(e.kind==="react" && e.data && e.data.rk==="answer"){
        const selA = (ti===tlSel.turn && ei===tlSel.evt) ? " sel" : "";
        rows += `<div class="evrow answerblock${selA}" data-turn="${ti}" data-i="${ei}">
          <div class="ablabel">✓ agent response${e.data.hop!=null?` · hop ${e.data.hop}`:""}${e.data.stop?` · ${esc(e.data.stop)}`:""}</div>
          <div class="atext">${esc(e.data.text||"")||'<span class="none">(empty)</span>'}</div></div>`;
        total++; return;
      }
      const w = e.dur ? Math.max(e.dur/maxd*100, 4) : 0;
      const sel = (ti===tlSel.turn && ei===tlSel.evt) ? " sel" : "";
      const depthCls = e.depth ? " depth"+e.depth : "";
      const reactCls = (e.kind==="react" && e.data) ? " react-"+(e.data.rk||"") : "";
      const chev = (e.kind==="step" && (e.children||[]).length)
        ? `<span class="stepchev" data-stepfold="${ei}" data-sturn="${ti}" title="fold/unfold this step's ReAct loop">${stepFolded?"▸":"▾"}</span>` : "";
      rows += `<div class="evrow${sel}${e.muted?" muted":""}${depthCls}${reactCls}" data-turn="${ti}" data-i="${ei}">
        <span class="evlane lane-${esc(e.lane)}">${esc(e.lane)}</span>
        <span class="evtitle">${chev}${esc(e.title)}${e.pinned?'<span class="badge pin">pin</span>':""}${e.bad?'<span class="badge bad">err</span>':""}
          ${e.sub?`<span class="evsub dim">${esc(e.sub)}</span>`:""}</span>
        <span class="evbarwrap">${e.dur?`<span class="evbar" style="width:${w}%"></span><span class="evms mono dim">${ms(e.dur)}</span>`:""}</span>
      </div>`;
      total++;
    });
    list += `<div class="tlturn">
      <div class="tldiv${collapsed?" collapsed":""}" data-tturn="${ti}" title="click to fold/unfold this turn's trace">
        <div class="tldnum"><span class="tlchev">${collapsed?"▸":"▾"}</span> #${it.idx+1} · ${esc(it.r.label||("turn "+(ti+1)))}
          <span class="tlcount">${it.events.length} events</span></div>
        <div class="tlmsg"><b>user</b> ${esc(it.r.query||"")}</div>
        <div class="tlmsg dim"><b>bot</b> ${esc(String(bot).slice(0,200))}</div>
        <div class="tlmeta">${esc(p.name||"?")} → ${esc((it.t.flow||{}).name||"?")} · ${it.events.length} events${it.t.total_latency_ms!=null?` · ${ms(it.t.total_latency_ms)}`:""}</div>
      </div>
      <div class="tlevents"${collapsed?' style="display:none"':""}>${rows}</div>
    </div>`;
  });
  const cur = items[tlSel.turn];
  h += `<p class="dim">${total} events across ${n} turn(s), in conversation order — click a turn header to fold its trace, or any event to inspect it.
    <button class="copy tlfold" data-all="collapse">collapse all</button>
    <button class="copy tlfold" data-all="expand">expand all</button></p>
    <div class="turnlayout">
      <div class="evlist">${list}</div>
      <div class="evdetail" id="evdetail">${renderInspector(cur.events[tlSel.evt], cur.t, cur.r, cur.events)}</div>
    </div>`;
  return h;
}
function wireTimeline(){
  const {items} = convItems();
  document.querySelectorAll(".evlist .evrow").forEach(row=>{
    row.onclick = ()=>{
      tlSel = {turn:+row.dataset.turn, evt:+row.dataset.i};
      // Focus this turn for the per-turn panels (Prompt / Lobes / Hotspots) too —
      // the conversation stays the same, so no chrome re-render needed.
      const conv = curConv();
      if(conv.idxs[tlSel.turn] != null){ turn = conv.idxs[tlSel.turn]; promptStep = 0; }
      document.querySelectorAll(".evlist .evrow").forEach(x=>
        x.classList.toggle("sel", +x.dataset.turn===tlSel.turn && +x.dataset.i===tlSel.evt));
      const it = items[tlSel.turn], det = document.getElementById("evdetail");
      if(it && det) det.innerHTML = renderInspector(it.events[tlSel.evt], it.t, it.r, it.events);
    };
  });
  // Fold/unfold a single step's nested ReAct loop (chevron only — not the row).
  document.querySelectorAll(".evlist .stepchev").forEach(ch=>{
    ch.onclick = (e)=>{
      e.stopPropagation();
      const key = `${ch.dataset.sturn}:${ch.dataset.stepfold}`;
      if(tlStepFold.has(key)) tlStepFold.delete(key); else tlStepFold.add(key);
      document.getElementById("panel").innerHTML = panelTimeline();
      wireTimeline();
    };
  });
  // Fold/unfold a turn's internal trace — DOM-only toggle (keeps scroll + selection).
  function setFold(head, collapse){
    const ti = +head.dataset.tturn, ev = head.nextElementSibling;
    if(collapse) tlCollapsed.add(ti); else tlCollapsed.delete(ti);
    if(ev) ev.style.display = collapse ? "none" : "";
    head.classList.toggle("collapsed", collapse);
    const chev = head.querySelector(".tlchev"); if(chev) chev.textContent = collapse ? "▸" : "▾";
  }
  document.querySelectorAll(".tldiv[data-tturn]").forEach(head=>{
    head.onclick = ()=> setFold(head, !tlCollapsed.has(+head.dataset.tturn));
  });
  document.querySelectorAll(".tlfold").forEach(b=>{
    b.onclick = ()=>{
      const collapse = b.dataset.all === "collapse";
      document.querySelectorAll(".tldiv[data-tturn]").forEach(head=> setFold(head, collapse));
    };
  });
}

/* ── Context lobes (OY) ───────────────────────────────────────────────────── */
function panelLobes(t, r){
  const lobes = t.lobes || [];
  if(!lobes.length) return '<p class="none">No lobe activation recorded.</p>';
  const events = turnEvents(t, r);
  if(netPos < 0 || netPos >= events.length) netPos = events.length - 1;  // default: full network
  const sel = events[netPos], selOrder = sel.order;
  const lobeOrder = {};
  events.filter(e=>e.kind==="lobe").forEach(e=>{ lobeOrder[e.data.id] = e.order; });

  // ── OX scrubber: click any point; the network shows what's active by then ──
  const ticks = events.map((e,i)=>
    `<button class="nettick lane-${esc(e.lane)}${i===netPos?" on":""}${e.muted?" muted":""}"
       data-i="${i}" title="${esc(e.title)}"></button>`).join("");
  // Turn selector (within the conversation) + flow-stage jumps. Stages are the
  // flow steps; each composes its OWN prompt (shown below when a stage is selected).
  let h = convTurnStrip();
  const stages = events.map((e,i)=>({e,i})).filter(x=>x.e.kind==="step");
  if(stages.length){
    h += `<div class="pstepsel"><span class="oylab">stages</span>`+ stages.map(({e,i})=>
      `<button class="pstepbtn${i===netPos?' on':''}" data-i="${i}" title="jump to stage ${esc(e.data.step)}">`+
      `${esc(e.data.step)}${e.data.system_prompt?'':' <span class="dim">·no prompt</span>'}</button>`
    ).join("") + `</div>`;
  }
  h += `<h3>Network over the timeline <span class="dim">— click a stage above or any point below to see which lobes are active by then</span></h3>`;
  h += `<div class="netscrubwrap">
    <button class="copy netstep" data-d="-1" title="previous point">◀</button>
    <div class="netscrub">${ticks}</div>
    <button class="copy netstep" data-d="1" title="next point">▶</button>
    <button class="copy netall" title="jump to the full network">all</button>
  </div>`;
  h += `<div class="netpos"><span class="evlane lane-${esc(sel.lane)}">${esc(sel.lane)}</span>
    point ${netPos+1}/${events.length} · <b>${esc(sel.title)}</b>${sel.sub?` <span class="dim">${esc(sel.sub)}</span>`:""}</div>`;

  // ── layer token totals, accumulated through the selected point ──
  const acc = {};
  events.filter(e=>e.kind==="lobe" && e.order<=selOrder && e.data.activated).forEach(e=>{
    const lay = (LAYERS[e.data.layer]||"?").split(" ").pop();
    acc[lay] = (acc[lay]||0) + (+e.data.tokens_after||0);
  });
  h += `<h3>Layer token totals <span class="dim">— accumulated through this point</span></h3><div class="cards">`+
    ["memory","skill","cognition","expression"].map(k=>
      `<div class="card"><div class="k">${k}</div><div class="v small">${num(acc[k]||0)}</div></div>`).join("")+`</div>`;

  // ── the network (OY) — node state reflects the selected point ──
  h += `<h3>Lobe network <span class="dim">— recall → skill → cognition → expression · edges = in_edges</span></h3>`;
  h += `<div class="lobe-net" id="lobenet"><svg class="edges" id="edges"></svg>`;
  const byLayer = {};
  lobes.forEach(l=>{ (byLayer[l.layer] = byLayer[l.layer]||[]).push(l); });
  Object.keys(byLayer).map(Number).sort((a,b)=>a-b).forEach(layer=>{
    h += `<div class="lcol"><h4>${esc(LAYERS[layer]||("layer "+layer))}</h4>`;
    byLayer[layer].forEach(l=>{
      const ord = lobeOrder[l.id] ?? 1e9;
      const live = ord <= selOrder && l.activated;        // active by this point
      const state = l.activated ? (live ? "lit" : "pending") : "off";
      const current = (sel.kind==="lobe" && sel.data.id===l.id) ? " current" : "";
      const cls = ["lnode", state, l.pinned?"pin":"", current].join(" ").replace(/\s+/g," ").trim();
      const sig = l.signals && Object.keys(l.signals).length ? JSON.stringify(l.signals,null,1) : "";
      const edges = l.in_edges && Object.keys(l.in_edges).length ? JSON.stringify(l.in_edges) : "";
      const sns = l.state_node_summary;
      h += `<div class="${cls}" data-id="${esc(l.id)}" data-edges='${esc(edges)}' data-live="${live?1:0}">
        <div><span class="lid">${esc(l.id)}</span><span class="lact">${num(l.activation)}</span></div>
        <div class="lreason">${esc(l.reason||"")}</div>
        <div class="pmeta mono dim">${num(l.tokens_in)}→${num(l.tokens_after)} tok${l.trimmed?` · trim ${num(l.trimmed)}`:""}${l.pinned?' · pinned':''}</div>
        ${(sig||sns)?`<details><summary>signals / state</summary>
          ${sig?`<pre>${esc(sig)}</pre>`:""}
          ${sns?`<pre>state: ${esc(JSON.stringify(sns))}</pre>`:""}</details>`:""}
      </div>`;
    });
    h += `</div>`;
  });
  h += `</div>`;

  // ── the stage's OWN prompt (each flow stage composes its own system prompt) ──
  if(sel.kind==="step"){
    const sc = callsForStage(t, sel.data.step);
    if(sc.length){
      const c0 = sc[0], u = sc[sc.length-1].usage||{};
      h += `<div class="metanote">exact payload: ${esc(c0.model||'?')} · T=${num(c0.temperature)} · max_tokens=${num(c0.max_tokens)} · `+
        `${sc.length} hop(s) · ${esc(sc[sc.length-1].stop_reason||'?')} · tools ${num(c0.tool_count)} `+
        `<span class="dim">(full messages/tools in the Prompt tab)</span></div>`;
    }
    if(sel.data.system_prompt){
      const psegs = (sel.data.system_segments||[]).slice().sort((a,b)=>a.start-b.start);
      h += `<h3>Stage prompt <span class="dim">— stage <b>${esc(sel.data.step)}</b> · composed system prompt, colored by source lobe</span></h3>`;
      h += `<div class="promptbox">${renderColored(sel.data.system_prompt, psegs)}</div>`;
    } else {
      h += `<p class="none">No captured prompt for stage <b>${esc(sel.data.step)}</b> — re-run with <code>AGENT_CORE_CAPTURE_PROMPTS=1</code>.</p>`;
    }
  }
  return h;
}

function wireLobes(t, r){
  const events = turnEvents(t, r);

  wireConvTurnStrip();

  document.querySelectorAll(".nettick").forEach(btn => btn.onclick = ()=>set(+btn.dataset.i));

function drawEdges(){
  const net = document.getElementById("lobenet"); if(!net) return;
  const svg = document.getElementById("edges"); if(!svg) return;
  const base = net.getBoundingClientRect();
  svg.setAttribute("viewBox",`0 0 ${net.scrollWidth} ${net.scrollHeight}`);
  svg.setAttribute("width",net.scrollWidth); svg.setAttribute("height",net.scrollHeight);
  const pos = {}, live = {};
  net.querySelectorAll(".lnode").forEach(n=>{
    const r = n.getBoundingClientRect();
    pos[n.dataset.id] = {
      l:r.left-base.left+net.scrollLeft, r:r.right-base.left+net.scrollLeft,
      cy:r.top-base.top+net.scrollTop+r.height/2, w:r.width,
    };
    live[n.dataset.id] = n.dataset.live === "1";
  });
  let paths="";
  net.querySelectorAll(".lnode").forEach(n=>{
    const tgt = pos[n.dataset.id]; if(!tgt) return;
    if(!live[n.dataset.id]) return;  // only draw edges into lobes active by this point
    let edges; try{ edges = JSON.parse(n.dataset.edges||"{}"); }catch(e){ edges={}; }
    Object.entries(edges).forEach(([src,w])=>{
      const s = pos[src]; if(!s || !live[src]) return;  // and from active sources only
      const x1=s.r, y1=s.cy, x2=tgt.l, y2=tgt.cy, mx=(x1+x2)/2;
      const sw = Math.max(0.8, Math.min(3.5, Math.abs(w)*2.5));
      const col = w>=0 ? "#1F6B4A" : "#b23b3b";
      paths += `<path d="M${x1},${y1} C${mx},${y1} ${mx},${y2} ${x2},${y2}"
        fill="none" stroke="${col}" stroke-width="${sw}" opacity="0.5"/>`;
    });
  });
  svg.innerHTML = paths;
}
window.addEventListener("resize", ()=>{ if(panel==="lobes") drawEdges(); });

/* ── Prompt (composed system prompt, colored by source lobe) ──────────────── */
// Stable hue per source string (FNV-1a → 0..359) so each lobe/region gets its
// own distinct color across renders.
function hueOf(s){ let h=2166136261; for(let i=0;i<s.length;i++){ h^=s.charCodeAt(i); h=Math.imul(h,16777619); } return (h>>>0)%360; }
// Soft tint only — readable black text on a faint per-source wash. The saturated
// hue shows in the legend swatch + hover, not as an underline on every line.
function srcStyle(src){ const h=hueOf(src); return `background:hsl(${h} 68% 93%)`; }
function srcSwatch(src){ return `hsl(${hueOf(src)} 58% 44%)`; }

// Non-lobe prompt regions: a one-line description shown when you click a span
// whose source isn't an actual lobe in trace.lobes.
const SOURCE_INFO = {
  system_prompt:"Base stage prompt — bot persona / default synthesis instructions (policy.system_prompt or the stage default).",
  stage_override:"Per-stage system_prompt override — replaces the whole composed prompt.",
  mezon_style:"Mezon chat-style overlay (conversational, heading-free) — Mezon surface only.",
  voice:"Persona voice overlay (policy.voice).",
  tone:"Tone directive (policy.tone).",
  language:"Language directive (policy.language, adaptive mode).",
  response_format:"Response-format directive (policy.response_format).",
  rules_must:"Positive rules — policy.must_include.",
  rules_must_not:"Negative rules — policy.must_not_include.",
  golden:"Golden-answer tool directive — search_golden.",
  identity:"Identity block — who the bot talks to + the channel (context resolver).",
  system_hints:"System-prompt hints injected by the worker/runtime.",
  datetime:"Current date/time — volatile tail.",
  mandatory_refusal:"Mandatory-refusal directive — turn-scoped.",
  lobe_context:"Header of the '## Lobe context' section (the live lobe-axis output appended to the base prompt).",
  flow_step:"Prior flow-step output carried forward via the blackboard (the inter-step evidence channel).",
};

function promptSteps(t){
  return (t.flow_steps||[]).filter(s=> typeof s.system_prompt === "string" && s.system_prompt.length);
}

function renderColored(text, segs){
  let out="", cur=0;
  segs.forEach((g,i)=>{
    if(g.start>cur) out += esc(text.slice(cur, g.start));   // uncolored gap (e.g. join separators)
    if(g.start<cur) return;                                  // overlap guard (shouldn't happen)
    const seg = text.slice(g.start, g.end);
    const dim = promptSource && promptSource!==g.source ? " dim" : "";
    const tip = `${g.source} · ${g.stability} · ${g.end-g.start} chars`;
    out += `<span class="seg${dim}" style="${srcStyle(g.source)}" data-src="${esc(g.source)}" title="${esc(tip)}">${esc(seg)}</span>`;
    cur = g.end;
  });
  if(cur<text.length) out += esc(text.slice(cur));
  return out;
}

// ── exact-payload helpers (trace.llm_calls — the REAL bytes sent per hop) ──────
function callsForStage(t, stage){
  return (t.llm_calls||[]).filter(c=>c.stage===stage).sort((a,b)=>(a.hop||0)-(b.hop||0));
}
// Flatten the real system param (string OR cache_control block array) → {text,
// cacheBreak} where cacheBreak is the char index after the last cached block.
function flatSystem(system){
  if(typeof system === "string") return {text:system, cacheBreak:-1};
  if(Array.isArray(system)){
    let text="", brk=-1;
    system.forEach((b,i)=>{ const tx=(b&&b.text)||""; if(i>0) text+="\n"; text+=tx;
      if(b && b.cache_control) brk=text.length; });
    return {text, cacheBreak:brk};
  }
  return {text:String(system==null?"":system), cacheBreak:-1};
}
// Re-anchor the reconstructed system_segments (offsets into reconText) onto the
// REAL system text by sequential substring find. Exact where they match; spans
// that don't locate are dropped → render uncolored (never wrong).
function realignSegs(reconText, reconSegs, realText){
  const out=[]; let cur=0;
  (reconSegs||[]).slice().sort((a,b)=>a.start-b.start).forEach(g=>{
    const sub = reconText.slice(g.start, g.end); if(!sub) return;
    let idx = realText.indexOf(sub, cur); if(idx<0) idx = realText.indexOf(sub);
    if(idx<0) return;
    out.push({source:g.source, stability:g.stability, start:idx, end:idx+sub.length});
    cur = idx+sub.length;
  });
  return out;
}
// Render a messages array as the literal ReAct reasoning flow.
function renderMessages(msgs){
  if(!msgs || !msgs.length) return '<p class="none">(no messages)</p>';
  const block = b => {
    if(typeof b === "string") return `<div class="mtext">${esc(b)}</div>`;
    if(b && b.type==="text") return `<div class="mtext">${esc(b.text||"")}</div>`;
    if(b && (b.type==="thinking"||b.type==="redacted_thinking"))
      return `<div class="mthink">✦ thinking<pre>${esc(b.type==="redacted_thinking"?"[redacted]":(b.thinking||""))}</pre></div>`;
    if(b && b.type==="tool_use") return `<div class="mtool">▸ tool_use <b>${esc(b.name||"")}</b>`+
      `<pre>${esc(JSON.stringify(b.input||{},null,1))}</pre></div>`;
    if(b && b.type==="tool_result"){ const c=b.content;
      return `<div class="mtoolr">◂ tool_result <span class="dim">${esc(b.tool_use_id||"")}</span>`+
        `<pre>${esc(typeof c==="string"?c:JSON.stringify(c,null,1))}</pre></div>`; }
    return `<div class="mtext dim">${esc(JSON.stringify(b))}</div>`;
  };
  return `<div class="msgs">`+ msgs.map(m=>{
    const role = m.role||"?";
    const body = typeof m.content==="string" ? `<div class="mtext">${esc(m.content)}</div>`
      : Array.isArray(m.content) ? m.content.map(block).join("")
      : `<div class="mtext dim">${esc(JSON.stringify(m.content))}</div>`;
    return `<div class="msg-row role-${esc(role)}"><span class="mrole">${esc(role)}</span><div class="mbody">${body}</div></div>`;
  }).join("") + `</div>`;
}
// The exact-payload section for a stage (hops · params · tools · messages).
function payloadSection(t, stage){
  const calls = callsForStage(t, stage);
  if(!calls.length){
    return `<h3>Exact LLM payload</h3><p class="none">No exact-payload capture for stage <b>${esc(stage)}</b> — `+
      `re-run with <code>AGENT_CORE_CAPTURE_PROMPTS=1</code> (records the real messages/tools/params per hop).</p>`;
  }
  let hop = promptHop < 0 || promptHop >= calls.length ? calls.length-1 : promptHop;  // default: last hop = full flow
  const c = calls[hop], u = c.usage||{};
  let h = `<h3>Exact LLM payload <span class="dim">— stage <b>${esc(stage)}</b> · the real bytes sent to ${esc(c.model||"the model")}${calls.length>1?` · ${calls.length} hops`:""}</span></h3>`;
  if(calls.length>1){
    h += `<div class="pstepsel"><span class="oylab">hops</span>`+ calls.map((cc,i)=>
      `<button class="hopbtn${i===hop?' on':''}" data-hop="${i}" data-stage="${esc(stage)}">hop ${cc.hop}`+
      `${cc.stop_reason?` <span class="dim">${esc(cc.stop_reason)}</span>`:""}</button>`).join("") + `</div>`;
  }
  // (model/temperature/max_tokens/stop_reason/tools/tokens/cache_read now live
  // in the Prompt panel's side panel — see panelPrompt's callmeta block.)
  // Which tools the model actually invoked this stage (tool_use blocks across hops).
  const called = new Set();
  calls.forEach(cc => (cc.messages||[]).forEach(m => {
    if(Array.isArray(m.content)) m.content.forEach(b => {
      if(b && b.type==="tool_use" && b.name) called.add(b.name); });
  }));
  if((c.tools||[]).length){
    // The 14 tools land via the SDK `tools` param, not the prompt prose — so a
    // flat list is hard to trace. Group by AREA (the namespace before the first
    // `.`; un-namespaced tools → "core") and flag the ones whose name ALSO
    // appears in the system prompt text (announced in prose, e.g. skill.read in
    // the skill index), so "what's actually offered where" reads at a glance.
    const sysText = c.system!=null
      ? (typeof c.system==="string" ? c.system : flatSystem(c.system).text) : "";
    // A tool is "named in the prompt" only as a whole token (bounded by
    // non-identifier chars, treating `.` as part of the name) — so `memory`
    // doesn't match inside another word and `kb.retrieve` ≠ `kb.retrieved`.
    const namedInPrompt = nm => {
      if(!sysText) return false;
      const e = nm.replace(/[.*+?^${}()|[\]\\]/g, "\\$&");
      return new RegExp(`(^|[^\\w.])${e}([^\\w.]|$)`).test(sysText);
    };
    const area = n => { const i=n.indexOf("."); return i>0 ? n.slice(0,i) : "core"; };
    const groups = {};
    c.tools.forEach(tl => { (groups[area(tl.name)] = groups[area(tl.name)]||[]).push(tl); });
    const order = Object.keys(groups).sort((a,b)=>
      groups[b].length-groups[a].length || a.localeCompare(b));
    const bar = order.map(a=>{
      const cl = groups[a].filter(tl=>called.has(tl.name)).length;
      return `<b>${esc(a)}</b> ${groups[a].length}${cl?` <span class="badge ok">✓${cl}</span>`:""}`;
    }).join(" · ");
    h += `<details class="toolsoffered" open><summary>tools offered (${c.tools.length}) `+
      `<span class="dim">— the SDK \`tools\` param (NOT prompt prose); grouped by area · ✓ = called this stage · `+
      `<span class="badge inprompt">prompt</span> = name also announced in the prompt text</span></summary>`;
    h += `<div class="areabar">${order.length} area(s): ${bar}</div>`;
    order.forEach(a=>{
      const list = groups[a];
      const calledN = list.filter(tl=>called.has(tl.name)).length;
      h += `<div class="toolarea"><span class="apref">${esc(a)}</span> `+
        `<span class="acount">— ${list.length} tool${list.length!==1?"s":""}`+
        `${calledN?` · ${calledN} called`:""}</span></div>`;
      h += list.map(tl=>{
        const params = (tl.params && tl.params.length
            ? tl.params : (tl.input_schema_keys||[]).map(k=>({name:k,required:false})))
          .map(p=>esc(p.name)+(p.required?'*':'')).join(', ');
        const isCalled = called.has(tl.name);
        const ok = isCalled ? ` <span class="badge ok">✓ called</span>` : "";
        const inP = namedInPrompt(tl.name)
          ? ` <span class="badge inprompt">prompt</span>` : "";
        const desc = tl.description ? `<div class="dim tdesc">${esc(tl.description)}</div>` : "";
        return `<div class="tooldef${isCalled?" called":""}"><code>${esc(tl.name)}(${params})</code>${ok}${inP}${desc}</div>`;
      }).join("");
    });
    h += `</details>`;
  }
  // Adaptive tool exposure (the tool_select lobe): what the relevance scorer
  // KEPT vs DROPPED for this stage. Only present when tool_strategy=adaptive.
  const tsel = (t.tool_selection||[]).find(x=>x.stage===stage);
  if(tsel){
    const kept = tsel.kept||[], dropped = tsel.dropped||[];
    h += `<details class="toolsoffered optsec" open><summary>tool_select — adaptive exposure (${kept.length} kept · ${dropped.length} dropped) `+
      `<span class="dim">— the lobe scored well-known tools by turn relevance; essentials (★) + external MCP always kept</span></summary>`;
    h += rows(kept.map(k=>({
      tool:(k.essential?"★ ":"")+k.name, l1:k.l1!=null?num(k.l1):"", l2:k.l2!=null?num(k.l2):"",
      activation:k.activation!=null?num(k.activation):"", in:"✓ kept"})).concat(
      dropped.map(d=>({tool:d.name, l1:num(d.l1), l2:num(d.l2), activation:num(d.activation),
        in:"✗ "+(d.reason||"dropped"), disabled:true}))),
      ["tool","l1","l2","activation","in"]);
    h += `</details>`;
  }
  // Adaptive skill list (skill_activate lobe, skill_strategy=adaptive): the
  // ranked on_demand index — which skill lines survived into the prompt.
  const ssel = (t.skill_selection||[]).find(x=>x.stage===stage);
  if(ssel && (ssel.ranking||[]).length){
    const rk = ssel.ranking;
    h += `<details class="toolsoffered optsec" open><summary>skill_select — adaptive skill list (${rk.filter(x=>x.kept).length}/${rk.length} kept) `+
      `<span class="dim">— on_demand index ranked by relevance; trimmed skills stay skill.read-able by slug; eager always inlined</span></summary>`;
    h += rows(rk.slice().sort((a,b)=>(b.activation||0)-(a.activation||0)).map(x=>({
      skill:x.label, l1:x.l1!=null?num(x.l1):"", l2:x.l2!=null?num(x.l2):"",
      activation:x.activation!=null?num(x.activation):"", in:x.kept?"✓ listed":"✗ trimmed",
      disabled:!x.kept})), ["skill","l1","l2","activation","in"]);
    h += `</details>`;
  }
  // LLM-reasoned activation (skill_strategy="reason"): the per-turn decision of
  // which DECLARED skills the turn needs — what scoped the skill block above.
  const sreason = t.skill_reasoning;
  if(sreason && (sreason.considered||[]).length){
    const sel = new Set(sreason.selected||[]);
    h += `<details class="toolsoffered optsec" open><summary>skill_reason — LLM-chosen skills (${(sreason.selected||[]).length}/${(sreason.considered||[]).length} active) `+
      `<span class="dim">— a reasoning step picked which declared skills this turn needs${sreason.reason?` · “${esc(sreason.reason)}”`:""}</span></summary>`;
    h += rows((sreason.considered||[]).map(s=>({skill:s, in:sel.has(s)?"✓ active":"✗ off", disabled:!sel.has(s)})), ["skill","in"]);
    h += `</details>`;
  }
  if(c.truncated) h += `<p class="dim">⚠ ${c.truncated} oversized field(s) elided for size</p>`;
  h += `<h4>messages <span class="dim">— the conversation/ReAct flow this hop actually sent</span></h4>`;
  h += renderMessages(c.messages);
  return h;
}

// ── "Is this prompt right?" — the signals that shaped the prompt (this turn) ──
function promptGlance(t, r, stage, stageCalls){
  const att = t.attention || {}, nodes = att.nodes || [];
  const sel = nodes.filter(n=>n.selected).length;
  const mem = ((r.context||{}).memory_items || []).length;
  const c0 = stageCalls[0] || {};
  const fstep = (t.flow_steps||[]).find(s=>s.step===stage) || {};
  const sysLen = c0.system != null
    ? (typeof c0.system==="string" ? c0.system.length : flatSystem(c0.system).text.length)
    : (fstep.system_prompt||"").length;
  const parts = [
    `system ${num(sysLen)}ch`,
    `${stageCalls.length||1} hop(s)`,
    c0.tool_count!=null ? `tools ${num(c0.tool_count)}` : "",
    nodes.length ? `context ${sel}/${nodes.length} selected` : "",
    att.total_tokens!=null ? `${num(att.total_tokens)}/${num(att.budget_tokens)} ctx-tok` : "",
    `memory ${mem}`,
  ].filter(Boolean);
  let h = `<div class="glance">`+parts.map(p=>`<span class="gchip">${esc(p)}</span>`).join("")+`</div>`;
  const skills = t.skills || {};
  if(Object.keys(skills).length)
    h += `<div class="dim" style="font-size:11.5px">skills: `+
      Object.entries(skills).map(([k,v])=>esc(k)+":"+esc(v)).join(" · ")+`</div>`;
  return h;
}
function attentionSection(t){
  const att = t.attention;
  if(!att || !(att.nodes||[]).length)
    return `<p class="dim">No adaptive attention captured (static context strategy, or not recorded).</p>`;
  const nodes = att.nodes.slice().sort((a,b)=>(b.activation||0)-(a.activation||0));
  const lt = att.layer_totals || {};
  let h = `<details open class="optsec"><summary>Context &amp; attention (this turn) `+
    `<span class="dim">— ${num(att.total_tokens)}/${num(att.budget_tokens)} tok · floor ${num(att.min_activation)} · injected vs dropped</span></summary>`;
  h += `<div class="cards">`+["memory","skill","cognition","expression"].map(k=>
    `<div class="card"><div class="k">${k}</div><div class="v small">${num(lt[k]||0)}</div></div>`).join("")+`</div>`;
  h += rows(nodes.map(n=>({
    kind:n.kind, id:n.id, l1:num(n.l1), l2:num(n.l2), activation:num(n.activation),
    tokens:num(n.tokens), in: n.selected ? (n.pinned?"✓ pinned":"✓ selected") : "✗ dropped",
    disabled: !n.selected,  // dims the row (rows() honors row.disabled)
  })), ["kind","id","l1","l2","activation","tokens","in"]);
  h += `</details>`;
  return h;
}
function memorySkillsSection(t, r){
  const ctx = r.context || {};
  const mem = ctx.memory_items||[], muts = ctx.memory_mutations||[], cv = ctx.ctxvars||[];
  const skills = t.skills||{}, sp = t.scratchpad||{};
  if(!mem.length && !muts.length && !cv.length && !Object.keys(skills).length && !Object.keys(sp).length)
    return "";
  let h = `<details class="optsec"><summary>Memory &amp; skills injected `+
    `<span class="dim">— durable facts available, agent writes, skills, ctxvars, RAM</span></summary>`;
  if(Object.keys(skills).length) h += `<div class="toolrow">`+
    Object.entries(skills).map(([k,v])=>`<span class="chip ${v==='activated'||v==='driving'?'tool':''}">${esc(k)}: ${esc(v)}</span>`).join("")+`</div>`;
  if(mem.length) h += rows(mem.map(m=>({scope:m.scope, key:m.key,
      value:vstr(m.value).slice(0,80), note:m.description||""})), ["scope","key","value","note"],
      "durable memory available");
  else h += `<p class="dim">No durable memory items loaded this turn.</p>`;
  if(muts.length) h += `<div style="margin:.3rem 0">agent wrote: `+
    muts.map(m=>`<span class="badge ${m.action==='forget'?'bad':'ok'}">${esc(m.action)} ${esc(m.scope||'')}:${esc(m.key||'')}</span>`).join(" ")+`</div>`;
  if(cv.length) h += rows(cv.map(v=>({key:v.key, line:v.line})), ["key","line"], "system context vars");
  const spk = Object.keys(sp);
  if(spk.length) h += `<div style="margin:.3rem 0">RAM keys: `+
    spk.map(k=>`<span class="chip">${esc(k)}</span>`).join(" ")+` <span class="dim">(see RAM tab)</span></div>`;
  h += `</details>`;
  return h;
}
function lobeBudgetSection(t){
  const lobes = (t.lobes||[]).filter(l=>l.activated);
  if(!lobes.length) return "";
  let h = `<details class="optsec"><summary>Per-lobe contribution &amp; budget (this turn) `+
    `<span class="dim">— tokens in→after (−trimmed) per activated lobe</span></summary>`;
  h += rows(lobes.map(l=>{
    const sns = l.state_node_summary || {};
    const empty = (sns.total||0)>0 && (sns.enabled||0)===0;
    return {lobe:l.id, reason:l.reason||"",
      "tok in→after":`${num(l.tokens_in)}→${num(l.tokens_after)}`,
      trimmed: l.trimmed ? ("−"+num(l.trimmed)) : "",
      wrote: empty ? "⚠ all state-nodes sub-threshold" : ((l.wrote||[]).join(", "))};
  }), ["lobe","reason","tok in→after","trimmed","wrote"]);
  h += `</details>`;
  return h;
}
function degradeMetaSection(t){
  const deg = t.degraded||[], meta = t.meta||{};
  let h = "";
  if(deg.length) h += `<p class="err" style="padding:.4rem .6rem;border-radius:6px;border:1px solid #f0c4c4">`+
    `⚠ infra degraded: ${deg.map(esc).join(", ")} — the prompt may be MISSING grounded context.</p>`;
  if(meta.action && meta.action!=="continue") h += `<p class="dim">metacognition: <b>${esc(meta.action)}</b>`+
    `${meta.target_step?` on ${esc(meta.target_step)}`:""}`+
    `${(meta.target_lobes||[]).length?` (lobes ${meta.target_lobes.map(esc).join(", ")})`:""} — may have trimmed the prompt.</p>`;
  return h;
}

function panelPrompt(t, r){
  const steps = promptSteps(t);
  const calls = t.llm_calls || [];
  if(!steps.length && !calls.length){
    return `<h3>System prompt</h3><p class="none">No captured prompts in this trace.</p>
      <p class="dim">Re-run the probe with <code>AGENT_CORE_CAPTURE_PROMPTS=1</code> to record the composed
      system prompt + per-lobe provenance + the exact LLM payload (messages/tools/params) for each flow step.</p>`;
  }
  // Stage list: flow steps with a reconstructed prompt, else derive from real calls.
  const stageNames = steps.length ? steps.map(s=>s.step)
    : [...new Set(calls.map(c=>c.stage))];
  if(promptStep>=stageNames.length) promptStep=0;
  const stageName = stageNames[promptStep];
  const s = steps.find(x=>x.step===stageName);

  // System text + provenance to color. Prefer the REAL captured system (hop 0 of
  // this stage); overlay the reconstructed per-lobe segments re-anchored onto it.
  const stageCalls = callsForStage(t, stageName);
  const realSys = stageCalls.length ? flatSystem(stageCalls[0].system) : null;
  const reconText = s ? s.system_prompt : "";
  let text, segs, cacheBreak = -1, sysNote = "";
  if(realSys){
    text = realSys.text; cacheBreak = realSys.cacheBreak;
    segs = s ? realignSegs(reconText, s.system_segments, text) : [];
    sysNote = "real bytes sent · provenance overlay is best-effort";
  } else {                                   // old artifact: reconstructed only
    text = reconText; segs = (s && s.system_segments || []).slice().sort((a,b)=>a.start-b.start);
    sysNote = "reconstructed (no exact-payload capture)";
  }
  const order=[], seen=new Set();
  segs.forEach(g=>{ if(!seen.has(g.source)){ seen.add(g.source); order.push(g.source); } });
  // Insert a visible cache_control breakpoint marker into the rendered system.
  let sysHtml = renderColored(text, segs);
  if(cacheBreak > 0){
    // re-render in two halves around the breakpoint so the marker lands cleanly
    const head = renderColored(text.slice(0,cacheBreak), segs.filter(g=>g.end<=cacheBreak));
    const tailSegs = segs.filter(g=>g.start>=cacheBreak).map(g=>({...g,start:g.start-cacheBreak,end:g.end-cacheBreak}));
    const tail = renderColored(text.slice(cacheBreak), tailSegs);
    sysHtml = head + `<div class="cachebreak">— cache_control: ephemeral breakpoint —</div>` + tail;
  }

  let h = convTurnStrip();
  h += `<h3>System prompt <span class="dim">— ${esc((DATA.records[turn]||{}).label||("turn "+(turn+1)))} · stage <b>${esc(stageName)}</b> · ${esc(sysNote)} · click a span to inspect it</span></h3>`;
  h += promptGlance(t, r, stageName, stageCalls);  // the "is everything here?" read
  h += `<div class="pstepsel">`+ stageNames.map((nm,i)=>{
      const st = steps.find(x=>x.step===nm), n = callsForStage(t,nm).length;
      return `<button class="pstepbtn${i===promptStep?' on':''}" data-step="${i}">${esc(nm)}`+
        ` <span class="dim mono">${st?num((st.system_prompt||'').length)+'ch':''}${n?` · ${n}h`:""}</span></button>`;
    }).join("") + `</div>`;
  h += `<div class="legend">`+ order.map(src=>
      `<button class="legchip${promptSource&&promptSource!==src?' off':''}" data-src="${esc(src)}">`+
      `<span class="sw" style="background:${srcSwatch(src)}"></span>${esc(src)}</button>`
    ).join("") + (promptSource?`<button class="legchip clear" data-src="">clear filter</button>`:"") + `</div>`;
  // LLM-call params live in the side panel (top), above the click-to-inspect
  // area — the exact bytes' model/temperature/tokens/cache for this stage.
  let metaHtml = "";
  if(stageCalls.length){
    const hp = promptHop<0||promptHop>=stageCalls.length ? stageCalls.length-1 : promptHop;
    const cc = stageCalls[hp], u = cc.usage||{};
    metaHtml = `<div class="callmeta"><h4>LLM call${stageCalls.length>1?` <span class="dim">hop ${cc.hop}</span>`:""}</h4>`+
      kvtable({model:cc.model, temperature:cc.temperature, max_tokens:cc.max_tokens,
        stop_reason:cc.stop_reason, tools:cc.tool_count,
        tokens:`${num(u.input_tokens)}→${num(u.output_tokens)}`,
        cache_read:u.cache_read_input_tokens!=null?num(u.cache_read_input_tokens):""})+`</div>`;
  }
  h += `<div class="promptlayout" id="promptlayout">`+
       `<div class="promptmain"><div class="promptbox" id="promptbox">${sysHtml}</div></div>`+
       `<div class="psplit" id="psplit" title="drag to resize"></div>`+
       `<aside class="promptside" id="lobedrawer" style="width:${promptSideW}px">`+
         metaHtml +
         `<div id="lobedraw"><div class="ldraw dim">Click a colored span to inspect the lobe / region that produced it.</div></div>`+
       `</aside>`+
       `</div>`;
  // The rest of the real call — messages (reasoning flow), tools, params, per hop.
  h += payloadSection(t, stageName);
  // ── "Is this prompt right?" — the signals that shaped it (this turn) ──
  h += `<h3 style="margin-top:1.6rem">Is this prompt right? `+
    `<span class="dim">— right info / attention / context / memory / skills · selected vs dropped (this turn)</span></h3>`;
  h += attentionSection(t);
  h += memorySkillsSection(t, r);
  h += lobeBudgetSection(t);
  h += degradeMetaSection(t);
  return h;
}

function lobeDrawer(t, src){
  const lobe = (t.lobes||[]).find(l=>l.id===src);
  if(lobe){
    const sig = lobe.signals||{};
    let h = `<div class="ldraw"><div class="ldhead">`+
      `<span class="sw" style="background:${srcSwatch(src)}"></span><b>${esc(lobe.id)}</b>`+
      `<span class="badge ${lobe.activated?'ok':'bad'}">${lobe.activated?'activated':'inactive'}</span>`+
      `<span class="chip">${esc(LAYERS[lobe.layer]||('L'+lobe.layer))}</span>`+
      `<span class="chip mono">act ${num(lobe.activation)}</span>`+
      (lobe.pinned?`<span class="badge pin">pinned</span>`:``)+`</div>`;
    if(lobe.reason) h += `<div class="dim">reason: ${esc(lobe.reason)}</div>`;
    if(lobe.wrote&&lobe.wrote.length) h += `<div style="margin:.3rem 0">wrote: ${lobe.wrote.map(w=>`<span class="chip">${esc(w)}</span>`).join(" ")}</div>`;
    if(Object.keys(sig).length){ h += `<h4>signals</h4>`+kvtable(sig); }
    const sn = lobe.state_nodes||[];
    if(sn.length) h += rows(sn.map(n=>({id:n.id,stability:n.stability,activation:num(n.activation),description:n.description})),
                            ["id","stability","activation","description"], "state nodes");
    return h+`</div>`;
  }
  const info = SOURCE_INFO[src] || "Prompt region — policy/runtime-composed chrome, not a lobe.";
  return `<div class="ldraw"><div class="ldhead"><span class="sw" style="background:${srcSwatch(src)}"></span>`+
    `<b>${esc(src)}</b> <span class="chip">prompt region</span></div><div class="dim">${esc(info)}</div></div>`;
}

function wirePrompt(t, r){
  wireConvTurnStrip();
  document.querySelectorAll(".pstepbtn").forEach(b=> b.onclick=()=>{ promptStep=+b.dataset.step; promptSource=null; promptHop=-1; renderPanel(); });
  document.querySelectorAll(".hopbtn").forEach(b=> b.onclick=()=>{ promptHop=+b.dataset.hop; renderPanel(); });
  document.querySelectorAll(".legchip").forEach(b=> b.onclick=()=>{ promptSource = b.dataset.src||null; renderPanel(); });
  document.querySelectorAll("#promptbox .seg").forEach(sp=> sp.onclick=()=>{
    document.querySelectorAll("#promptbox .seg.sel").forEach(x=>x.classList.remove("sel"));
    sp.classList.add("sel");
    // Write into the sub-div so the call-meta block at the top of the side panel stays put.
    document.getElementById("lobedraw").innerHTML = lobeDrawer(t, sp.dataset.src);
  });
  // Drag the splitter to resize the inspector column (dragging left widens it).
  const split = document.getElementById("psplit"),
        side  = document.getElementById("lobedrawer"),
        wrap  = document.getElementById("promptlayout");
  if(split && side && wrap){
    split.onmousedown = e=>{
      e.preventDefault();
      const startX = e.clientX, startW = side.offsetWidth, total = wrap.offsetWidth;
      split.classList.add("drag"); document.body.classList.add("col-resizing");
      const move = ev=>{
        const w = Math.max(220, Math.min(total-260, startW - (ev.clientX - startX)));
        promptSideW = Math.round(w); side.style.width = promptSideW + "px";
      };
      const up = ()=>{ split.classList.remove("drag"); document.body.classList.remove("col-resizing");
        window.removeEventListener("mousemove", move); window.removeEventListener("mouseup", up); };
      window.addEventListener("mousemove", move); window.addEventListener("mouseup", up);
    };
  }
}

/* ── per-turn axis chips (the OX/OY/metacognition glance) ─────────────────── */
function axisChips(t, r){
  const p = t.path||{}, f = t.flow||{}, m = t.meta||{}, u = t.usage_rollup||{};
  const st = (r.status||"").toLowerCase();
  const c = [
    `<span class="gchip">path <b>${esc(p.name||"?")}</b>${p.score!=null?` ${num(p.score)}`:""}${p.emergent?" ·emergent":""}</span>`,
    `<span class="gchip">flow <b>${esc(f.name||"?")}</b></span>`,
    `<span class="gchip">${(t.flow_steps||[]).length} step(s)</span>`,
  ];
  if(m.mode||m.action) c.push(`<span class="gchip">μ ${esc(m.mode||"observe")}${m.action?` · ${esc(m.action)}`:""}</span>`);
  if(t.total_latency_ms!=null) c.push(`<span class="gchip">${ms(t.total_latency_ms)}</span>`);
  c.push(`<span class="gchip">tok in ${num(u.input_tokens)} · out ${num(u.output_tokens)}</span>`);
  c.push(`<span class="badge ${st==='error'?'bad':(r.refusal_reason?'pin':'ok')}">${esc(r.status||'?')}${r.refusal_reason?' · refused':''}</span>`);
  (t.degraded||[]).forEach(d=>c.push(`<span class="badge bad">${esc(d)}</span>`));
  return `<div class="glance">${c.join("")}</div>`;
}

/* ── Flow · OX (path → flow → steps over time) ────────────────────────────── */
function panelFlow(t, r){
  const steps = t.flow_steps||[], p = t.path||{}, f = t.flow||{};
  const loopBadge = lp => `<span class="badge ${lp==='agentic'?'agentic':'single'}">${esc(lp||'single')}</span>`;
  let h = `<p class="dim">How this turn progressed: the recognized intent picks a flow, and the flow runs an ordered list of steps (left → right). Each step runs a small loop and consults a set of lobes for context.</p>`;
  h += `<div class="cards">
    <div class="card"><div class="k">intent (recognized path)</div><div class="v small">${esc(p.name||'?')}</div>
      <div class="dim">${p.score!=null?`score ${num(p.score)}`:''}${p.emergent?' · emergent':''}${p.runner_up?` · runner-up ${esc(p.runner_up.name)} ${num(p.runner_up.score)}`:''}</div></div>
    <div class="card"><div class="k">flow (pipeline)</div><div class="v small">${esc(f.name||'?')}</div><div class="dim">${steps.length} step(s)</div></div>
  </div>`;
  if(!steps.length) return h+'<p class="none">No flow steps recorded for this turn.</p>';
  h += `<h3>Steps, in order</h3>`;
  h += `<div class="pipe">`+ steps.map((s,i)=>{
    const md = s.metadata||{}, lobes = s.lobe_ids||s.lobes||[];
    const sigNodes = (s.state_nodes||[]).filter(n=>String(n.id||'').endsWith(':signal'));
    const box = `<div class="pstep${md.error?' err':''}">
      <div class="pname">${esc(s.step||s.name||'?')}${s.type?` <span class="chip" title="running model — how the stage executes">${esc(s.type)}</span>`:''}</div>
      <div class="pmeta">${loopBadge(s.loop)}${md.hops?` · ${md.hops} hop(s)`:''}</div>
      ${sigNodes.length?`<div class="pmeta">signal: ${sigNodes.map(n=>`<span class="oychip ${n.activated?'lit':'dark'}" title="${esc(n.reason||'')}">${esc(String(n.id).replace(/:signal$/,''))}${n.activated?' ✓':''}</span>`).join(' ')}</div>`:''}
      <div class="pmeta">in ${num(s.tokens_in)} · out ${num(s.tokens_out)}${s.latency_ms!=null?` · ${ms(s.latency_ms)}`:''}</div>
      ${lobes.length?`<div class="toolrow">${lobes.slice(0,8).map(l=>`<span class="chip">${esc(l)}</span>`).join('')}${lobes.length>8?`<span class="chip">+${lobes.length-8}</span>`:''}</div>`
                    :`<div class="pmeta" style="color:var(--bad)">∅ empty lobe slice</div>`}
      ${(s.tools||[]).length?`<details><summary class="dim">${s.tools.length} tool(s)</summary><div class="toolrow">${s.tools.map(x=>`<span class="chip tool">${esc(x)}</span>`).join('')}</div></details>`:''}
      ${md.error?`<div class="pmeta" style="color:var(--bad)">${esc(md.error)}</div>`:''}
    </div>`;
    return box + (i<steps.length-1?`<div class="parrow">→</div>`:'');
  }).join('')+`</div>`;
  const series = steps.flatMap(s=>((s.metadata||{}).funnel_obs_chars)||[]);
  if(series.length>1) h += `<h3>per-hop observation funnel <span class="dim">— message-tail chars</span></h3><p class="dim mono">${series.map(v=>num(v)).join(' → ')}</p>`;
  h += `<p class="dim"><b>loop</b>: agentic = tool/ReAct loop · single = one model call · none = pure prompt build. <b>lobes</b> = the context workers that step consulted (open the Lobes tab for detail). Tune a step's lobe set with <code>flow_&lt;step&gt;__lobe_&lt;id&gt;__add/remove</code>.</p>`;
  return h;
}

/* ── Metacognition (monitor → regulate, always on) ────────────────────────── */
function panelMeta(t, r){
  const m = t.meta||{}, q = t.meta_queue||[];
  let h = `<h3>Metacognition <span class="dim">— monitor → regulate, always on</span></h3>`;
  if(!Object.keys(m).length && !q.length) return h+'<p class="none">No metacognition record on this turn.</p>';
  const mode = m.mode||"observe";
  h += `<div class="cards">
    <div class="card"><div class="k">mode</div><div class="v small">${esc(mode)}</div><div class="dim">${mode==='apply'?'live — applies allow-listed actions':'shadow — monitors only'}</div></div>
    <div class="card"><div class="k">decision</div><div class="v small">${esc(m.action||'—')}</div><div class="dim">${m.applied?'applied':'not applied'}${m.confidence!=null?` · conf ${num(m.confidence)}`:''}</div></div>
    ${m.target_step?`<div class="card"><div class="k">target step</div><div class="v small">${esc(m.target_step)}</div></div>`:''}
  </div>`;
  if(m.reason) h += `<div class="metabar"><span class="mu">μ</span> ${esc(m.reason)}</div>`;
  if((m.target_lobes||[]).length) h += `<h4 class="dim">regulation target lobes</h4><div>${m.target_lobes.map(x=>`<span class="chip">${esc(x)}</span>`).join('')}</div>`;
  h += `<h3>Observations</h3>`;
  h += q.length ? rows(q, ["id","kind","target","severity","detail"]) : '<p class="none">No observations queued.</p>';
  h += `<details class="optsec"><summary>vocabulary &amp; hard limits</summary>
    <p><b>Observations:</b> context_tight · empty_lobe_slice · empty_step_context · low_confidence_path <span class="dim">(deferred: context_overflow · missing_memory)</span></p>
    <p><b>Decisions:</b> continue · adjust_lobe_slice <span class="dim">(trims optional lobes only)</span> · retry_step · skip_step · meta_review <span class="dim">(deferred tier-moves: trim/summarize/retrieve/expand_context)</span></p>
    <p class="dim">Hard limits — pinned steps <code>cite</code> and <code>filter</code> are never skippable; ground-or-refuse is never a metacognition decision.</p></details>`;
  return h;
}

/* ── Skills (workflows the model is driven through) ───────────────────────── */
// Lifecycle (01-architecture.md): skill:list → select:cue → read:hint →
// in_use → guide. trace.skills records the live coarse state per active skill
// {slug: selecting|activated|driving}; the declared roster rides record.context.
const _SKILL_STAGES = ["selecting","activated","driving"];
const _SKILL_STATE_BADGE = {selecting:"single", activated:"ok", driving:"agentic"};
function panelSkills(t, r){
  const live = t.skills||{};
  const declared = (r.context||{}).skills_declared||[];
  const roster = [...new Set([...declared, ...Object.keys(live)])].sort();
  let h = `<h3>Skills <span class="dim">— workflows the model is driven through</span></h3>`;
  h += `<p class="dim">lifecycle: skill:list → select:cue → read:hint → in_use → guide</p>`;
  if(roster.length){
    h += `<table><tr><th>skill</th><th>state</th><th>lifecycle</th></tr>`+ roster.map(s=>{
      const state = live[s] || "inactive", idx = _SKILL_STAGES.indexOf(state);
      const badge = _SKILL_STATE_BADGE[state] || "single";
      const chips = _SKILL_STAGES.map((st,i)=>`<span class="oychip ${st===state?'lit':(idx>=0&&i<idx?'pending':'dark')}">${esc(st)}</span>`).join(" ");
      return `<tr><td><b>${esc(s)}</b></td><td><span class="badge ${badge}">${esc(state)}</span></td><td>${chips}</td></tr>`;
    }).join("")+`</table>`;
  } else h += '<p class="none">No skills declared or activated this turn.</p>';
  if((t.skill_selection||[]).length)
    h += rows(t.skill_selection.flatMap(s=>(s.ranking||[]).map(d=>({stage:s.stage, ...d}))),
              ["stage","label","activation","kept"], "Adaptive skill selection (per stage)");
  if(t.skill_reasoning) h += `<h4>reasoned activation</h4><pre>${esc(JSON.stringify(t.skill_reasoning,null,2))}</pre>`;
  return h;
}

/* ── Tasks (long-rail autonomous execution) ───────────────────────────────── */
// 01-architecture.md: a task advances a bot_task_todos checklist across
// fires. Two lists: the TEMPLATE catalog (what can be authored) and the active
// task STATES (the running checklists). Both ride record.context (probe.py).
function panelTasks(t, r){
  const ctx = r.context||{};
  const templates = ctx.task_templates||[];
  const items = ctx.task_items||[];
  const sp = t.scratchpad||{};
  let h = `<h3>Task templates <span class="dim">— the catalog a turn can author from</span></h3>`;
  if(templates.length){
    h += `<table><tr><th>slug</th><th>name</th><th>description</th><th>vars</th><th>default cron</th></tr>`+
      templates.map(tp=>{
        const vars = (tp.variables||[]).map(v=>`${esc(v.name)}${v.required?'*':''}`).join(", ");
        return `<tr><td class="mono">${esc(tp.slug)}</td><td>${esc(tp.name)}</td><td>${esc(tp.description||'')}</td>`+
               `<td>${vars||'<span class="dim">–</span>'}</td><td class="mono">${esc(tp.default_cron||'–')}</td></tr>`;
      }).join("")+`</table>`;
  } else h += '<p class="none">No task templates in scope (the catalog is only loaded on task-management turns).</p>';

  h += `<h3>Task states <span class="dim">— active checklists (the todo rail)</span></h3>`;
  const STC = {done:"#1F6B4A",skipped:"#6b7280",todo:"#B8845B",doing:"#2563eb",blocked:"#b91c1c"};
  if(items.length){
    h += items.map(it=>{
      const st = (it.status||"").toLowerCase();
      const badge = st==="blocked"||st==="failed"||st==="waiting_for_human" ? "bad"
                  : (st==="done"||st==="completed" ? "ok" : "single");
      const todos = (it.todos||[]);
      const done = todos.filter(td=>["done","skipped"].includes((td.status||"").toLowerCase())).length;
      const pct = todos.length ? Math.round(100*done/todos.length) : 0;
      const rows = todos.map(td=>{
        const s=(td.status||"todo").toLowerCase(), c=STC[s]||"#46443d";
        const deps=(td.deps&&td.deps.length)?` <span class="mono dim">⟂ needs ${td.deps.map(esc).join(", ")}</span>`:"";
        const off=(s==="done"||s==="skipped")?"opacity:.55;text-decoration:line-through":"";
        const res=td.result?` <span class="dim">→ ${esc(td.result)}</span>`:"";
        return `<li style="margin:2px 0;${off}"><span style="display:inline-block;min-width:62px;color:${c};`+
               `font-weight:700;font-size:10.5px;text-transform:uppercase;letter-spacing:.03em">${esc(s)}</span> `+
               `${esc(td.title)}${deps}${res}</li>`;
      }).join("");
      const bar = `<div style="background:#e9e6dd;border-radius:5px;height:7px;margin:5px 0 9px;overflow:hidden">`+
                  `<div style="background:#1F6B4A;height:100%;width:${pct}%"></div></div>`;
      return `<div class="turnblk"><b>${esc(it.title||it.id||'task')}</b> `+
             `<span class="badge ${badge}">${esc(it.status||'?')}</span> `+
             `<span class="dim">· ${done}/${todos.length} todos done</span>`+
             (it.goal||it.instruction?`<div class="dim" style="margin:3px 0 2px">${esc(it.goal||it.instruction)}</div>`:"")+
             bar + `<ol style="list-style:decimal;margin:0;padding-left:24px;font-size:13px">${rows}</ol></div>`;
    }).join("");
  } else h += '<p class="none">No active tasks this turn.</p>';

  h += `<h3>Execution scratchpad <span class="dim">— rail: recall_state → advance → checkpoint → report → continue?</span></h3>`;
  h += Object.keys(sp).length ? `<pre>${esc(JSON.stringify(sp,null,2))}</pre>`
     : '<p class="none">No task scratchpad on this turn (not a task-execution fire).</p>';
  return h;
}

/* ── Subagents (plan-driven fan-out: one worker per todo) ──────────────────── */
// Each map stage records per-worker sub-traces on flow_steps[].subagents:
// {label, status, system_prompt, steps:[{kind,...}], llm_calls, tokens_used}. Every
// worker has its OWN isolated context + timeline — this panel shows each one.
function _subStep(s){
  const k = s.kind || "?";
  if(k==="tool_use")    return `<li class="sa-tu">→ <b>${esc(s.name||"tool")}</b>(${esc(JSON.stringify(s.input||{}).slice(0,120))})</li>`;
  if(k==="tool_result") return `<li class="sa-tr">← ${esc(String(s.output||"").split("\n")[0].slice(0,140))}</li>`;
  if(k==="thinking")    return `<li class="sa-th dim">· ${esc(String(s.text||"").slice(0,140))}</li>`;
  if(k==="answer")      return `<li class="sa-an">✓ ${esc(String(s.text||"").slice(0,200))}</li>`;
  return `<li class="dim">${esc(k)}</li>`;
}
function panelSubagents(t, r){
  const steps = t.flow_steps || [];
  const groups = steps.filter(s => (s.subagents||[]).length);
  let h = `<h3>Subagents <span class="dim">— plan-driven fan-out: one isolated worker per todo</span></h3>`;
  if(!groups.length)
    return h + '<p class="none">No fan-out on this turn (no stage ran loop="map" with a plan to fan out).</p>';
  const sp = (r.trace||t||{}).blackboard || {};
  const structure = sp.plan_structure;
  if(structure) h += `<p class="dim">execution structure: <span class="badge ${structure==='fanout'?'agentic':'single'}">${esc(structure)}</span> `+
                     `(${structure==='fanout'?'workers ran in parallel, each isolated':'workers ran in order, carrying prior results'})</p>`;
  groups.forEach(st=>{
    const subs = st.subagents||[];
    h += `<h4 class="dim">stage <code>${esc(st.step)}</code> · ${subs.length} subagent(s)</h4>`;
    h += subs.map((sa,i)=>{
      const ok = sa.status!=="failed";
      const badge = ok ? "ok" : "bad";
      const tl = (sa.steps||[]).map(_subStep).join("");
      const promptId = `sa-${st.step}-${i}`;
      return `<div class="turnblk">
        <b>${esc(sa.label||("worker "+(i+1)))}</b>
        <span class="badge ${badge}">${esc(sa.status||"ok")}</span>
        <span class="dim">· ${(sa.steps||[]).length} step(s) · ${(sa.llm_calls||[]).length} hop(s) · ${num(sa.tokens_used||0)} tok</span>
        ${sa.system_prompt?`<details class="optsec"><summary>its system prompt (own isolated context)</summary><pre id="${promptId}">${esc(sa.system_prompt)}</pre></details>`:""}
        <ol class="sa-tl" style="list-style:none;margin:6px 0 0;padding-left:6px;font-size:12.5px;border-left:2px solid #e9e6dd">${tl||'<li class="none">no steps captured</li>'}</ol>
      </div>`;
    }).join("");
  });
  return h;
}

/* ── Hotspots & hints ─────────────────────────────────────────────────────── */
/* ── Context Efficiency (PreAct) ────────────────────────────────────────
   "Optimizing context, not maximizing context" — useful reasoning per token.
   Reads attention.{nodes,tiers}, usage_rollup, and flow_steps funnel telemetry.
   Falls back gracefully on traces that predate the tier/funnel fields. */
const _TIER = {1:["#1F6B4A","Tier 1 · inject"],2:["#B8845B","Tier 2 · hint"],3:["#8a8a8a","Tier 3 · offload"]};
function _pct(x){ return x==null ? "–" : (Math.round(x*1000)/10)+"%"; }
function _effCard(label, value, sub){
  return `<div style="flex:1;min-width:150px;border:1px solid #ddd;border-radius:8px;padding:10px 12px">
    <div class="dim" style="font-size:11px;text-transform:uppercase;letter-spacing:.04em">${esc(label)}</div>
    <div style="font-size:22px;font-weight:600">${esc(value)}</div>
    <div class="dim" style="font-size:11px">${esc(sub||"")}</div></div>`;
}
function panelEfficiency(t, r){
  const u = t.usage_rollup || {};
  const attn = t.attention || {};
  const anodes = attn.nodes || [];
  const tiers = attn.tiers || {};
  const tnodes = tiers.nodes || [];

  // Context efficiency = useful (selected) tokens / total candidate tokens.
  const totTok = anodes.reduce((a,n)=>a+(n.tokens||0), 0);
  const selTok = anodes.filter(n=>n.selected).reduce((a,n)=>a+(n.tokens||0), 0);
  const ctxEff = totTok ? selTok/totTok : null;
  // Context density = mean CDS of injected (Tier-1) nodes (reasoning value / token).
  const inj = tnodes.filter(n=>n.tier===1);
  const meanCds = inj.length ? inj.reduce((a,n)=>a+(n.cds||0),0)/inj.length : null;
  // Cache hit rate = cache-read / input tokens.
  const cacheRate = u.input_tokens ? (u.cache_read_input_tokens||0)/u.input_tokens : null;
  // Budget utilization = selected context tokens / budget.
  const budgetUtil = attn.budget_tokens ? (attn.total_tokens||0)/attn.budget_tokens : null;

  let h = `<h3>Context efficiency <span class="dim">— useful reasoning per token (PreAct)</span></h3>`;
  h += `<div style="display:flex;gap:10px;flex-wrap:wrap;margin:8px 0 16px">`+
    _effCard("Context efficiency", _pct(ctxEff), totTok?`${num(selTok)} / ${num(totTok)} candidate tok`:"no scored nodes")+
    _effCard("Context density (CDS)", meanCds==null?"–":num(meanCds), inj.length?`mean over ${inj.length} injected`:"no Tier-1 nodes")+
    _effCard("Cache hit rate", _pct(cacheRate), `${num(u.cache_read_input_tokens)} / ${num(u.input_tokens)} in-tok`)+
    _effCard("Budget use", _pct(budgetUtil), attn.budget_tokens?`${num(attn.total_tokens)} / ${num(attn.budget_tokens)} tok`:"no budget")+
  `</div>`;

  // Tier distribution (the OY funnel): tokens per exposure tier.
  if(tnodes.length){
    const tok = {1:0,2:0,3:0}, cnt = {1:0,2:0,3:0};
    tnodes.forEach(n=>{ const k=n.tier||3; tok[k]=(tok[k]||0)+(n.tokens||0); cnt[k]=(cnt[k]||0)+1; });
    const tot = (tok[1]+tok[2]+tok[3])||1;
    h += `<h3>Exposure tiers <span class="dim">— inject-full · hint+tool · offload</span></h3>`;
    h += `<div style="display:flex;height:22px;border-radius:4px;overflow:hidden;margin:6px 0">`+
      [1,2,3].map(k=>{ const w=100*tok[k]/tot; return w>0?
        `<div title="${esc(_TIER[k][1])}: ${cnt[k]} node(s), ${tok[k]} tok" style="width:${w}%;background:${_TIER[k][0]}"></div>`:"";
      }).join("")+`</div>`;
    h += `<table><tr><th>tier</th><th>nodes</th><th>tokens</th><th>share</th></tr>`+
      [1,2,3].map(k=>`<tr><td><span style="display:inline-block;width:10px;height:10px;border-radius:2px;background:${_TIER[k][0]}"></span> ${esc(_TIER[k][1])}</td>`+
        `<td>${cnt[k]}</td><td>${num(tok[k])}</td><td>${_pct(tok[k]/tot)}</td></tr>`).join("")+`</table>`;
    if(cnt[2]>0) h += `<p class="dim">${cnt[2]} node(s) kept as a recall-to-read hint instead of being silently dropped — PreAct's "no silent drop".</p>`;
  } else {
    h += `<p class="none">No tier routing on this turn (set context_strategy=adaptive with react_context_strategy=funnel to populate).</p>`;
  }

  // Per-hop observation funnel (only on turns with tool hops).
  const series = (t.flow_steps||[]).flatMap(s=>((s.metadata||{}).funnel_obs_chars)||[]);
  if(series.length>1){
    const mx = Math.max(...series)||1;
    const deltas = series.slice(1).map((v,i)=>v-series[i]);
    const bounded = deltas.every(d=>d < mx*0.6);
    h += `<h3>Per-hop observation funnel <span class="dim">— message-tail chars after re-tiering</span></h3>`;
    h += `<div style="display:flex;gap:6px;align-items:flex-end;height:90px;margin:8px 0">`+
      series.map((v,i)=>`<div title="hop ${i}: ${v} chars" style="flex:1;background:#1F6B4A;height:${Math.max(4,100*v/mx)}%"></div>`).join("")+`</div>`;
    h += `<p class="dim">hops: ${series.map(v=>num(v)).join(" → ")} · ${bounded?"funneled (bounded growth — spent observations demoted)":"growing"}</p>`;
  }

  h += `<p class="dim" style="margin-top:14px">Definitions — efficiency: selected ÷ candidate context tokens · density: mean CDS=(relevance×utility)/cost of injected nodes · cache: provider cache-read ÷ input. See docs/concepts/04-react-context-management.md.</p>`;
  return h;
}

function panelHotspots(t, r){
  const out = [];
  const steps = t.flow_steps || [], lobes = t.lobes || [];
  const topStep = [...steps].sort((a,b)=>(b.latency_ms||0)-(a.latency_ms||0)).slice(0,3);
  if(topStep.length && topStep[0].latency_ms)
    out.push(["Slowest flow steps", topStep.map(s=>`${s.step} (${ms(s.latency_ms)})`).join(" · ")]);
  const topLobe = [...lobes].filter(l=>l.latency_ms).sort((a,b)=>(b.latency_ms||0)-(a.latency_ms||0)).slice(0,3);
  if(topLobe.length) out.push(["Slowest lobes", topLobe.map(l=>`${l.id} (${ms(l.latency_ms)})`).join(" · ")]);
  const trimmed = lobes.filter(l=>l.trimmed);
  if(trimmed.length) out.push(["Budget-trimmed lobes", trimmed.map(l=>`${l.id} (−${num(l.trimmed)} tok)`).join(" · ")]);
  const subthresh = lobes.filter(l=>{ const s=l.state_node_summary; return l.activated && s && (s.total||0)>0 && (s.enabled||0)===0; });
  if(subthresh.length) out.push(["Activated but all state-nodes sub-threshold", subthresh.map(l=>l.id).join(" · ")]);
  const empty = steps.filter(s=>(s.node_count||0)===0);
  if(empty.length) out.push(["Steps that produced no context nodes", empty.map(s=>s.step).join(" · ")]);
  if((t.degraded||[]).length) out.push(["Infra degradation", (t.degraded).join(" · ")]);
  const u = t.usage_rollup||{};
  out.push(["Tokens", `out ${num(u.output_tokens)} · cache-read ${num(u.cache_read_input_tokens)} · in ${num(u.input_tokens)}`]);

  let h = `<h3>Auto-detected hotspots</h3>`;
  h += out.length ? `<table><tr><th>signal</th><th>detail</th></tr>`+
       out.map(([k,v])=>`<tr><td>${esc(k)}</td><td>${esc(v)}</td></tr>`).join("")+`</table>`
     : '<p class="none">No hotspots flagged.</p>';

  h += `<h3>Engine optimization hints <span class="dim">— suggest_axis_optimizations()</span></h3>`;
  const hints = r.hints || [];
  h += hints.length ? hints.map(x=>`<div class="hint">
      <span class="ht">[${esc(x.axis)}] ${esc(x.target)}</span> — ${esc(x.reason)}
      ${x.weight_patch&&Object.keys(x.weight_patch).length?`<div class="mono dim">patch: ${esc(JSON.stringify(x.weight_patch))}</div>`:""}
    </div>`).join("")
    : '<p class="none">No hints baked into this record (the bench didn\'t attach any).</p>';

  // The three documented tuning levels (01-architecture.md · Inspection and
  // Optimization Surfaces) — where to act on what this turn surfaced.
  h += `<details class="optsec" open><summary>Tuning surfaces — lobe unit · flow step · whole engine</summary>
    <p><b>Lobe unit (OY)</b> — bias or gate a lobe: <code>prior_&lt;lobe&gt;</code>, <code>min_&lt;lobe&gt;</code>, <code>disable_&lt;lobe&gt;_&lt;node&gt;</code> in <code>flow_lobe_weights</code>. See the Lobes panel for activation reasons.</p>
    <p><b>Flow step (OX)</b> — reshape a step's lobe slice / loop / tools: <code>flow_&lt;step&gt;__lobe_&lt;id&gt;__add/remove</code>, <code>flow_layer_budgets</code>. See the Flow panel.</p>
    <p><b>Whole engine</b> — context vs flow knobs: <code>context_strategy</code> (static/adaptive/llm), <code>react_context_strategy</code> (funnel/accumulate), <code>flow_strategy</code> (static/adaptive), <code>context_budget_tokens</code>.</p>
    <p class="dim">Read-only snapshot APIs: <code>inspect_lobe_axis</code> · <code>inspect_flow_axis</code> · <code>snapshot_engine</code> · <code>suggest_axis_optimizations</code> (agent_core.inspection).</p></details>`;
  return h;
}

/* ── Raw JSON ─────────────────────────────────────────────────────────────── */
function panelRaw(t, r){
  return `<button class="copy" id="copybtn">Copy trace JSON</button>
    <details class="raw" open><summary>trace</summary><pre id="rawtrace">${esc(JSON.stringify(t,null,2))}</pre></details>
    <details class="raw"><summary>full record (trace + checks + tools + hints)</summary>
      <pre>${esc(JSON.stringify(r,null,2))}</pre></details>`;
}
function wireCopy(){
  const b = document.getElementById("copybtn"); if(!b) return;
  b.onclick = ()=>{ navigator.clipboard.writeText(document.getElementById("rawtrace").textContent)
    .then(()=>{ b.textContent="Copied ✓"; setTimeout(()=>b.textContent="Copy trace JSON",1200); }); };
}

/* ── shared table helper ──────────────────────────────────────────────────── */
function rows(list, cols, title){
  const t = title ? `<h3>${esc(title)}</h3>` : "";
  if(!list || !list.length) return t+'<p class="none">(none)</p>';
  const cell = v => (v && typeof v==="object") ? esc(JSON.stringify(v)) : esc(v);
  return t+`<table><tr>${cols.map(c=>`<th>${esc(c)}</th>`).join("")}</tr>`+
    list.map(row=>`<tr class="${row.disabled||row.skipped?'off':''}">`+
      cols.map(c=>`<td>${cell(row[c])}</td>`).join("")+`</tr>`).join("")+`</table>`;
}

/* ── boot + drag-drop ─────────────────────────────────────────────────────── */
function boot(){
  const embed = document.getElementById("trace-data");
  if(embed && embed.textContent.trim()){
    try{ load(JSON.parse(embed.textContent)); return; }catch(e){ console.error("bad embedded JSON",e); }
  }
  document.getElementById("drop").hidden = false;
}
function readFile(f){ const fr = new FileReader();
  fr.onload = ()=>{ try{ load(JSON.parse(fr.result)); }catch(e){ alert("Not valid JSON: "+e); } };
  fr.readAsText(f); }
document.addEventListener("DOMContentLoaded", ()=>{
  boot();
  const drop = document.getElementById("drop");
  document.getElementById("file").addEventListener("change", e=>{ if(e.target.files[0]) readFile(e.target.files[0]); });
  ["dragenter","dragover"].forEach(ev=>document.addEventListener(ev,e=>{e.preventDefault();drop.classList.add("over");drop.hidden=false;}));
  document.addEventListener("dragleave",e=>{ if(e.relatedTarget===null) drop.classList.remove("over"); });
  document.addEventListener("drop",e=>{ e.preventDefault(); drop.classList.remove("over");
    if(e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0]); });
});
</script>
</body>
