<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 420" width="720" font-family="ui-monospace, 'Geist Mono', SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6Z" fill="#0E0E0C"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="720" height="420" fill="#FAFAF7"/>

  <!-- metacognition band -->
  <rect x="60" y="28" width="600" height="34" rx="9" fill="rgba(184,132,91,0.10)" stroke="#B8845B" stroke-dasharray="5 4"/>
  <text x="360" y="50" text-anchor="middle" font-size="12.5" fill="#8a5f3c" font-weight="600">metacognition · monitor → regulate</text>

  <!-- axes -->
  <line x1="120" y1="340" x2="668" y2="340" stroke="#0E0E0C" stroke-width="2"/>
  <line x1="120" y1="340" x2="120" y2="96" stroke="#0E0E0C" stroke-width="2"/>
  <polygon points="668,340 657,335 657,345" fill="#0E0E0C"/>
  <polygon points="120,96 115,107 125,107" fill="#0E0E0C"/>
  <text x="400" y="406" text-anchor="middle" font-size="13" fill="#B8845B" font-weight="600">OX · stages (time) →</text>
  <text x="40" y="225" text-anchor="middle" font-size="13" fill="#1F6B4A" font-weight="600" transform="rotate(-90 40 225)">OY · lobes (context) ↑</text>

  <!-- highlighted vertical lobe slice over the synthesize column -->
  <rect x="261" y="118" width="92" height="158" rx="9" fill="rgba(31,107,74,0.07)" stroke="#1F6B4A" stroke-dasharray="3 3"/>
  <g font-size="11" fill="#1F6B4A" text-anchor="middle">
    <rect x="271" y="130" width="72" height="22" rx="5" fill="#fff" stroke="#1F6B4A"/><text x="307" y="145">memory</text>
    <rect x="271" y="158" width="72" height="22" rx="5" fill="#fff" stroke="#1F6B4A"/><text x="307" y="173">skill</text>
    <rect x="271" y="186" width="72" height="22" rx="5" fill="#fff" stroke="#1F6B4A"/><text x="307" y="201">task</text>
    <rect x="271" y="214" width="72" height="22" rx="5" fill="#fff" stroke="#1F6B4A"/><text x="307" y="229">tools</text>
    <rect x="271" y="242" width="72" height="22" rx="5" fill="#1F6B4A" stroke="#1F6B4A"/><text x="307" y="257" fill="#fff">cognition</text>
  </g>
  <text x="307" y="296" text-anchor="middle" font-size="10" fill="#1F6B4A">a stage consults</text>
  <text x="307" y="310" text-anchor="middle" font-size="10" fill="#1F6B4A">a vertical lobe slice</text>

  <!-- OX stage rail -->
  <g font-size="11.5" fill="#0E0E0C" text-anchor="middle">
    <rect x="175" y="326" width="66" height="28" rx="6" fill="#fff" stroke="#0E0E0C"/><text x="208" y="344">research</text>
    <line x1="243" y1="340" x2="259" y2="340" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="261" y="326" width="92" height="28" rx="6" fill="#fff" stroke="#0E0E0C"/><text x="307" y="344">synthesize</text>
    <line x1="355" y1="340" x2="371" y2="340" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>

    <rect x="373" y="326" width="50" height="28" rx="6" fill="#1F6B4A" stroke="#1F6B4A"/><text x="398" y="344" fill="#fff">cite</text>
    <line x1="425" y1="340" x2="441" y2="340" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="443" y="326" width="58" height="28" rx="6" fill="#1F6B4A" stroke="#1F6B4A"/><text x="472" y="344" fill="#fff">filter</text>
    <line x1="503" y1="340" x2="519" y2="340" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>
    <rect x="521" y="326" width="80" height="28" rx="6" fill="#0E0E0C" stroke="#0E0E0C"/><text x="561" y="344" fill="#FAFAF7">respond</text>
  </g>

  <!-- minimal legend -->
  <g font-size="10" fill="#0E0E0C" fill-opacity="0.6">
    <rect x="373" y="368" width="11" height="11" rx="2" fill="#1F6B4A"/>
    <text x="390" y="378" text-anchor="start">pinned — ground-or-refuse, never skipped</text>
  </g>
</svg>
