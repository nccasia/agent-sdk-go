<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" width="720" font-family="ui-monospace, 'Geist Mono', SFMono-Regular, Menlo, monospace">
  <defs>
    <marker id="ah" markerWidth="9" markerHeight="9" refX="6" refY="3" orient="auto">
      <path d="M0,0 L6,3 L0,6Z" fill="#0E0E0C"/>
    </marker>
  </defs>

  <!-- backdrop -->
  <rect x="0" y="0" width="720" height="300" fill="#FAFAF7"/>

  <!-- title -->
  <text x="20" y="26" font-size="12.5" fill="#0E0E0C" font-weight="600">how a turn runs — a deterministic pipeline, not a free tool loop</text>

  <!-- query in -->
  <rect x="20" y="118" width="62" height="30" rx="6" fill="#0E0E0C" stroke="#0E0E0C"/>
  <text x="51" y="137" text-anchor="middle" font-size="11" fill="#FAFAF7">query</text>
  <line x1="82" y1="133" x2="100" y2="133" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- recognize path -->
  <rect x="100" y="112" width="104" height="42" rx="6" fill="#fff" stroke="#0E0E0C"/>
  <text x="152" y="130" text-anchor="middle" font-size="11" fill="#0E0E0C">recognize path</text>
  <text x="152" y="145" text-anchor="middle" font-size="9.5" fill="#8a5f3c">intent · free signals</text>
  <line x1="204" y1="133" x2="222" y2="133" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- select flow -->
  <rect x="222" y="112" width="92" height="42" rx="6" fill="#fff" stroke="#0E0E0C"/>
  <text x="268" y="130" text-anchor="middle" font-size="11" fill="#0E0E0C">select flow</text>
  <text x="268" y="145" text-anchor="middle" font-size="9.5" fill="#1F6B4A">the OX path</text>
  <line x1="314" y1="133" x2="332" y2="133" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- per-stage box with metacognition band -->
  <rect x="332" y="74" width="214" height="150" rx="10" fill="rgba(31,107,74,0.05)" stroke="#1F6B4A"/>
  <text x="439" y="92" text-anchor="middle" font-size="10.5" fill="#1F6B4A" font-weight="600">for each stage</text>

  <!-- metacognition band over the stage -->
  <rect x="344" y="100" width="190" height="24" rx="7" fill="rgba(184,132,91,0.10)" stroke="#B8845B" stroke-dasharray="5 4"/>
  <text x="439" y="116" text-anchor="middle" font-size="9.5" fill="#8a5f3c" font-weight="600">metacognition · monitor → regulate</text>

  <rect x="344" y="132" width="190" height="22" rx="5" fill="#fff" stroke="#1F6B4A"/>
  <text x="439" y="147" text-anchor="middle" font-size="10" fill="#1F6B4A">build context — a lobe slice (OY)</text>
  <rect x="344" y="160" width="190" height="22" rx="5" fill="#fff" stroke="#1F6B4A"/>
  <text x="439" y="175" text-anchor="middle" font-size="10" fill="#1F6B4A">compose prompt</text>
  <rect x="344" y="188" width="190" height="22" rx="5" fill="#fff" stroke="#1F6B4A"/>
  <text x="439" y="203" text-anchor="middle" font-size="10" fill="#1F6B4A">loop — none / single / agentic</text>

  <line x1="546" y1="133" x2="564" y2="133" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>

  <!-- final shaping: cite / filter pinned, format -->
  <text x="642" y="92" text-anchor="middle" font-size="10.5" fill="#0E0E0C" font-weight="600">final shaping</text>
  <rect x="564" y="104" width="52" height="26" rx="6" fill="#1F6B4A" stroke="#1F6B4A"/>
  <text x="590" y="121" text-anchor="middle" font-size="10.5" fill="#fff">cite</text>
  <rect x="564" y="136" width="52" height="26" rx="6" fill="#1F6B4A" stroke="#1F6B4A"/>
  <text x="590" y="153" text-anchor="middle" font-size="10.5" fill="#fff">filter</text>
  <rect x="624" y="120" width="76" height="26" rx="6" fill="#fff" stroke="#0E0E0C"/>
  <text x="662" y="137" text-anchor="middle" font-size="10.5" fill="#0E0E0C">format</text>

  <!-- result out -->
  <line x1="662" y1="146" x2="662" y2="180" stroke="#0E0E0C" stroke-width="1.5" marker-end="url(#ah)"/>
  <rect x="600" y="182" width="120" height="30" rx="6" fill="#0E0E0C" stroke="#0E0E0C"/>
  <text x="660" y="201" text-anchor="middle" font-size="11" fill="#FAFAF7">result + trace</text>

  <!-- legend / footnote -->
  <g font-size="10" fill="#0E0E0C" fill-opacity="0.62">
    <rect x="20" y="246" width="11" height="11" rx="2" fill="#1F6B4A"/>
    <text x="37" y="256" text-anchor="start">pinned — ground-or-refuse, never skipped</text>
    <text x="20" y="276" text-anchor="start" fill-opacity="1" fill="#8a5f3c">deterministic core = pure fn of (spec, context) · every LLM / tool / store call sits behind a protocol</text>
  </g>
</svg>
